# QLoRA Configuration: Qwen3-4B on RTX 5090 (32GB)
# Estimated VRAM: ~11GB (4-bit base + LoRA adapters in fp16)

model:
  name: "Qwen/Qwen3-4B"
  max_seq_length: 2048
  dtype: null  # auto-detect
  load_in_4bit: true  # QLoRA: 4-bit quantized base

lora:
  r: 64                    # LoRA rank — higher = more capacity
  lora_alpha: 64           # scaling factor (alpha/r = 1.0 is standard)
  lora_dropout: 0.05
  target_modules:          # Which layers to adapt
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"

training:
  dataset: "training/datasets/train.jsonl"
  output_dir: "training/checkpoints/qwen3-4b-qlora-v1"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4  # effective batch size = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  seed: 42
  bf16: true
  gradient_checkpointing: true
  optim: "adamw_8bit"     # 8-bit Adam for memory efficiency

# Adapter output
adapter:
  save_path: "training/checkpoints/qwen3-4b-qlora-v1/adapter"
  push_to_hub: false
